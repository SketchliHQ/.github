name: Sketchli
description: Innovative design and development solutions that bring your ideas to life
baseurl: ""
url: "https://sketchlihq.github.io"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO settings
title: Sketchli - Innovative Design Solutions
tagline: Bringing your ideas to life through innovative design and development
author:
  name: Sketchli Team
  email: hello@sketchli.com

# Social media
social:
  name: Sketchli
  links:
    - https://github.com/SketchliHQ

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md